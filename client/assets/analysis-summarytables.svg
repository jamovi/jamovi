  <!-- 3x3 table grid: white fill, colored strokes -->
  <!-- Cells: 14w x 8h, stroke 3px, ~5px gap between cells -->
  <!-- Centered in 74x44 canvas -->
  <!-- Col positions: x=10, x=30, x=50 -->
  <!-- Row positions: y=4, y=18, y=32 -->
  <g fill="#fff">
    <!-- Header Row: dark blue strokes -->
    <rect x="10" y="4" width="14" height="8" stroke="#3e6da9" stroke-width="3"/>
    <rect x="30" y="4" width="14" height="8" stroke="#3e6da9" stroke-width="3"/>
    <rect x="50" y="4" width="14" height="8" stroke="#3e6da9" stroke-width="3"/>
    <!-- Row 1: label=blue, data=gray, summary=amber -->
    <rect x="10" y="18" width="14" height="8" stroke="#6b9de8" stroke-width="3"/>
    <rect x="30" y="18" width="14" height="8" stroke="#acacac" stroke-width="3"/>
    <rect x="50" y="18" width="14" height="8" stroke="#e6ac40" stroke-width="3"/>
    <!-- Row 2: label=blue, data=gray, summary=amber -->
    <rect x="10" y="32" width="14" height="8" stroke="#6b9de8" stroke-width="3"/>
    <rect x="30" y="32" width="14" height="8" stroke="#acacac" stroke-width="3"/>
    <rect x="50" y="32" width="14" height="8" stroke="#e6ac40" stroke-width="3"/>
  </g>
</svg>